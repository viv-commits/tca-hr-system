<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — TCA HR Compliance</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --teal:#006B5F;--teal-dark:#004F46;--bg:#F7F5EF;--text:#1A1A1A;
    --border:#E0DED6;--err:#C0392B;--ok:#0E7C3A;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:'DM Sans',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
  .wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;}
  .left{display:flex;align-items:center;justify-content:center;padding:40px;}
  .right{background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;}
  .right h1{font-size:72px;margin:0;letter-spacing:2px;}
  .right p{opacity:.9;margin-top:8px;}
  .card{width:100%;max-width:380px;}
  .logo{width:56px;height:56px;border-radius:12px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;margin-bottom:28px;}
  .eyebrow{font-size:12px;letter-spacing:2px;color:#6B6B6B;text-transform:uppercase;margin-bottom:6px;}
  h2{font-size:32px;margin:0 0 24px 0;font-weight:600;}
  label{display:block;font-size:14px;margin:14px 0 6px 0;font-weight:500;}
  input[type=password]{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;background:#EEF0E9;font-size:15px;outline:none;}
  input[type=password]:focus{border-color:var(--teal);background:#fff;}
  button.primary{width:100%;padding:14px;background:var(--teal);color:#fff;border:0;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;margin-top:20px;}
  button.primary:hover{background:var(--teal-dark);}
  button.primary:disabled{opacity:.6;cursor:not-allowed;}
  .banner{padding:12px 14px;border-radius:8px;font-size:14px;margin-bottom:16px;}
  .banner.err{background:#FDECEA;color:var(--err);border:1px solid #F5C6C1;}
  .banner.ok{background:#E8F5EC;color:var(--ok);border:1px solid #BFE0C9;}
  .link{margin-top:18px;text-align:center;font-size:14px;}
  .link a{color:var(--teal);text-decoration:none;}
  .foot{margin-top:36px;font-size:12px;color:#8A8A8A;text-align:center;}
  .hide{display:none;}
  @media (max-width:800px){.wrap{grid-template-columns:1fr;}.right{min-height:160px;}.right h1{font-size:42px;}}
</style>
<script>
  // Capture hash BEFORE supabase-js can consume it
  (function(){
    var h = (window.location.hash || '').replace(/^#/, '');
    var out = {};
    if (h) {
      h.split('&').forEach(function(kv){
        var p = kv.split('=');
        if (p[0]) out[decodeURIComponent(p[0])] = decodeURIComponent((p[1]||'').replace(/\+/g,' '));
      });
    }
    window.__tcaInitialHash = out;
    window.__tcaHasRecoveryToken = !!(out.access_token && (out.type === 'recovery' || out.type === 'magiclink'));
    window.__tcaHasError = !!(out.error || out.error_code);
  })();
</script>
</head>
<body>
<div class="wrap">
  <div class="left">
    <div class="card">
      <div class="logo">TCA</div>
      <div class="eyebrow">Welcome back</div>
      <h2 id="heading">Set a new password</h2>
      <div id="banner" class="banner hide"></div>
      <form id="resetForm">
        <label for="pw1">New password</label>
        <input type="password" id="pw1" autocomplete="new-password" minlength="8" required>
        <label for="pw2">Confirm password</label>
        <input type="password" id="pw2" autocomplete="new-password" minlength="8" required>
        <button type="submit" class="primary" id="submitBtn">Update password</button>
      </form>
      <div class="link"><a href="/">&larr; Back to sign in</a></div>
      <div class="foot">&copy; The Care Advantage &middot; Secure login</div>
    </div>
  </div>
  <div class="right">
    <h1>TCA</h1>
    <p>HR Compliance System</p>
  </div>
</div>
<script>
(function(){
  var SB_URL = 'https://vhebrkhdgeiyxkpphlut.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoZWJya2hkZ2VpeXhrcHBobHV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTIyMjQsImV4cCI6MjA5MDI4ODIyNH0.8ux8cztStNiGEt1fRsVZYubhE2inx24iQaCiZdQV3lk';

  var banner = document.getElementById('banner');
  var form = document.getElementById('resetForm');
  var heading = document.getElementById('heading');
  var btn = document.getElementById('submitBtn');

  function showBanner(kind, msg){
    banner.className = 'banner ' + kind;
    banner.textContent = msg;
    banner.classList.remove('hide');
  }

  var hash = window.__tcaInitialHash || {};

  // Case 1: Error hash (expired / used link)
  if (window.__tcaHasError) {
    heading.textContent = 'Reset link expired';
    form.classList.add('hide');
    var msg = hash.error_description || 'That password reset link has expired or was already used.';
    showBanner('err', msg + ' Please request a new one from the sign-in page.');
    try { history.replaceState(null, '', window.location.pathname); } catch(e){}
    return;
  }

  // Case 2: No hash at all — link was opened directly (not from email)
  if (!window.__tcaHasRecoveryToken) {
    heading.textContent = 'Invalid reset link';
    form.classList.add('hide');
    showBanner('err', 'This page must be opened from a password reset email. Please request a new one from the sign-in page.');
    return;
  }

  // Case 3: Valid recovery token — create client and set session from hash
  var sb = window.supabase.createClient(SB_URL, SB_KEY, {
    auth: { persistSession: true, storage: window.sessionStorage, detectSessionInUrl: false, flowType: 'implicit' }
  });

  // Manually set the session from the recovery tokens in the hash
  sb.auth.setSession({
    access_token: hash.access_token,
    refresh_token: hash.refresh_token || ''
  }).then(function(res){
    if (res.error) {
      heading.textContent = 'Reset link expired';
      form.classList.add('hide');
      showBanner('err', (res.error.message || 'Reset link is no longer valid.') + ' Please request a new one.');
    } else {
      // Clean the hash so refresh doesn't re-run
      try { history.replaceState(null, '', window.location.pathname); } catch(e){}
    }
  });

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    var pw1 = document.getElementById('pw1').value;
    var pw2 = document.getElementById('pw2').value;
    if (pw1.length < 8) { showBanner('err', 'Password must be at least 8 characters.'); return; }
    if (pw1 !== pw2) { showBanner('err', 'Passwords do not match.'); return; }
    btn.disabled = true; btn.textContent = 'Updating...';
    try {
      var { data, error } = await sb.auth.updateUser({ password: pw1 });
      if (error) {
        showBanner('err', error.message || 'Could not update password. The link may have expired.');
        btn.disabled = false; btn.textContent = 'Update password';
        return;
      }
      showBanner('ok', 'Password updated. Redirecting to sign in...');
      await sb.auth.signOut();
      setTimeout(function(){ window.location.href = '/'; }, 1200);
    } catch (err) {
      showBanner('err', (err && err.message) || 'Unexpected error. Please try again.');
      btn.disabled = false; btn.textContent = 'Update password';
    }
  });
})();
</script>
</body>
</html>
